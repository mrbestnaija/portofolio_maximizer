# Quant Success Helper Configuration
# References:
# - Documentation/QUANTIFIABLE_SUCCESS_CRITERIA.md
# - Documentation/OPTIMIZATION_IMPLEMENTATION_PLAN.md
# - Documentation/SANITY_CHECK_COMPLETE.md

quant_validation:
  enabled: true
  objective_mode: domain_utility  # Canonical repo-wide default: asymmetric upside with bounded downside
  validation_mode: forecast_edge  # drift_proxy | forecast_edge
  lookback_days: 365  # Align with quant-validation automation to grow sample size
  risk_free_rate: 0.04  # Annualized risk-free assumption per success doc
  benchmark_column: null  # Set to column name (e.g., 'SP500') when available
  capital_base: 25000  # Matches PRS readiness capital target

  # Forecast-edge validation uses rolling-window CV regression metrics to
  # measure whether the forecaster adds incremental predictive power versus
  # a baseline model (default: SAMOSSA).
  forecast_edge_cv:
    min_train_size: 180
    step_size: null  # Defaults to forecast_horizon
    max_folds: 2
    baseline_model: samossa

  success_criteria:
    # Phase 7.10: Recalibrated to magnitude-asymmetry regime (2.65x win/loss ratio,
    # 41% WR). Previous thresholds caused 94.2% FAIL rate (P0 adversarial finding).
    # System profits through asymmetric sizing, not directional accuracy.
    min_annual_return: -0.05     # Deprecated diagnostic-only threshold; ignored by live PASS/FAIL
    min_sharpe: -0.10            # Deprecated diagnostic-only threshold; ignored by live PASS/FAIL
    min_sortino: -0.10           # Deprecated diagnostic-only threshold; ignored by live PASS/FAIL
    max_drawdown: 0.45           # Phase 7.10: Widened from 0.40 to accommodate volatility
    min_omega_ratio: 1.00        # Forward EV gate (tau=0): conf*upside / (1-conf)*stop > 1.0; positive expected-value requirement per signal. NOT the NGN portfolio hurdle (which is a portfolio-level goal, not a per-trade filter). Data source: signal-level Bernoulli distribution from target/stop/confidence, not historical daily bar returns.
    min_omega_robustness_score: 0.45  # Require Omega to survive realistic hurdle escalation. Computable only when execution_drag_hurdle is present; absent value is excluded gracefully via strict_weight_coverage=false.
    min_payoff_asymmetry: 2.0    # Forward R:R ratio = upside_pct / stop_pct. Threshold 2.0 = minimum 2:1 reward-to-risk. At WR=38% and R:R=2:1, EV=+0.14; at prior 0.60, EV=-0.39. _calculate_targets() now enforces this geometrically by extending target to current + 2×stop_dist when forecast target falls short. Data source: signal.target_price vs signal.stop_loss.
    min_trimmed_payoff_asymmetry: 1.10  # Support-aware asymmetry floor after trimming concentrated tail winners/losses
    max_winner_concentration_ratio: 0.60  # One winner must not dominate realized convexity proof
    min_profit_factor: 0.80      # Retained as a secondary realized-quality metric; lower weight than payoff asymmetry because PF mixes hit-rate with payoff shape
    min_win_rate: 0.30           # Deprecated diagnostic-only threshold; ignored by live PASS/FAIL
    min_expected_profit: 5.00          # Phase 7.10b: Absolute floor ($); raised from 0.50 to prevent trivially small trades
    min_expected_profit_pct: 0.002    # Phase 7.10b: Relative floor (0.2% of capital_base=$50); PASS if either met
    # Forecast-edge criteria (used when validation_mode=forecast_edge).
    max_rmse_ratio_vs_baseline: 1.20  # Phase 7.10: Widened from 1.10 to allow more candidates through
    min_terminal_directional_accuracy: 0.45  # Canonical directional gate for multi-bar trade alignment
    min_expected_shortfall: -0.0108         # 10× NGN daily hurdle (~1.08%/day CVaR floor); ES is tail loss not return hurdle
    bucket_hard_gate_criteria:
      safe: []
      core:
        - expected_shortfall
      spec:
        - expected_shortfall
        - gap_risk_to_edge
        - liquidity_to_depth
    max_gap_risk_to_edge:
      core: 1.00
      spec: 0.75
    max_liquidity_to_depth:
      core: 0.20
      spec: 0.10
    require_significance: false
    min_information_ratio: 0.0

  # Two-layer scoring is the implementation detail for the canonical domain_utility objective.
  # Layer 1: hard economic/statistical blockers only. Forecast-edge RMSE / terminal-DA remain
  #          visible and scored, but are soft by default so they do not mechanically veto
  #          asymmetric-payoff trades.
  # Layer 2: continuous domain utility on asymmetric upside and bounded downside.
  scoring_mode: domain_utility        # 'domain_utility' (canonical) or 'all_pass' (legacy)
  pass_threshold: 0.60               # Minimum weighted score to PASS (0.0-1.0)
  strict_weight_coverage: false      # OOS metrics (terminal_ci_coverage, terminal_directional_accuracy) are not always computable at signal time; missing components are excluded from the weighted score rather than hard-failing the signal
  hard_gate_criteria:
    - expected_profit
    - significance
    - information_ratio
  utility_weights:
    # Barbell-objective weights (Nigeria jurisdiction, 2026-04-10 recalibration):
    # - Omega + payoff_asymmetry are the two primary upside-shape terms. The
    #   current 2.65x realized avg-win/avg-loss profile should raise utility
    #   directly instead of being forced through profit_factor alone.
    # - profit_factor remains present, but with a lower weight because it mixes
    #   payoff shape with hit-rate frequency.
    # - terminal_ci_coverage remains explicit for tail-control / stop placement.
    # Weights sum to 1.0 when terminal_ci_coverage is present; when absent (non-
    # forecast_edge mode), the weight resolver distributes proportionally via defaults.
    expected_profit: 0.18            # Economic viability of the proposed trade; also remains a hard gate by default
    omega_ratio: 0.20                # Primary realized-distribution hurdle vs NGN carry/friction
    omega_robustness_score: 0.10     # Survives threshold escalation from K=0 to NGN+execution drag
    payoff_asymmetry: 0.14           # Forward R:R: upside_pct / stop_pct from signal's target/stop (replaces historical avg_gain/|avg_loss|)
    profit_factor: 0.10              # Secondary realized quality context
    terminal_directional_accuracy: 0.10  # Multi-step directional alignment with realized trade payoff
    terminal_ci_coverage: 0.10      # CI quality gate — did realized price land inside forecast CI?
    max_drawdown: 0.04               # Drawdown containment
    expected_shortfall: 0.04         # Tail-loss below NGN daily threshold (0.108%/day)

  calibration:
    db_path: "data/portfolio_maximizer.db"  # Explicit path so _calibrate_confidence() executes Platt query
    raw_weight: 0.80              # Weight given to raw (uncalibrated) confidence in the blended output
    max_downside_adjustment: 0.15 # Maximum allowed downward adjustment from Platt correction
    max_upside_adjustment: 0.10   # Maximum allowed upward adjustment from Platt correction (guardrail, not primary objective)

  # Optional per-ticker overrides for success criteria; used by
  # models/time_series_signal_generator.TimeSeriesSignalGenerator when
  # building quant validation profiles. This allows asset-class-aware
  # expected_profit thresholds without changing the global floor.
  per_ticker:
    "BTC-USD":
      success_criteria:
        min_expected_profit: 75.0   # Require larger edge for crypto TS trades
    "CL=F":
      success_criteria:
        min_expected_profit: 75.0   # Crude oil: higher threshold due to volatility
    "AAPL":
      # Phase 7.10: Aligned with recalibrated global thresholds
      success_criteria:
        min_annual_return: -0.05
        max_drawdown: 0.45
        min_profit_factor: 0.80
        min_expected_profit: 1.0

  bootstrap:
    n_samples: 400
    confidence_level: 0.95

  visualization:
    enabled: true               # Emit overview PNGs for dashboards/debugging
    output_dir: "visualizations/quant_validation"
    max_points: 200

  logging:
    enabled: true               # Persist JSONL entries for troubleshooting
    log_dir: "logs/signals"
    filename: "quant_validation.jsonl"
    tail_entries: 10            # Used by bash helpers when printing summaries

# THR-03 compatibility shim: Layer 3 and older health scripts still read the root key.
# Keep the deprecated alias in sync with the canonical terminal-directional threshold.
quant_success:
  quant_validation:
    min_terminal_directional_accuracy: 0.45
    min_directional_accuracy: 0.45
