forecaster_monitoring:
  quant_validation:
    # Production thresholds used for per-ticker alerts and
    # GREEN tier classification in summarize_quant_validation.py.
    min_profit_factor: 1.1
    min_win_rate: 0.52
    min_annual_return: 0.0
    min_pass_rate: 0.05

    # Global ceilings used by check_quant_validation_health.py
    # to gate CI/brutal runs. A global FAIL fraction above 85% or more than
    # half of entries having negative expected_profit will trip the hard gate
    # and mark the run RED.
    max_fail_fraction: 0.85
    max_negative_expected_profit_fraction: 0.5

    # Softer global warning band used to classify runs as
    # YELLOW when they are better than the hard RED gate but
    # still outside the comfortable GREEN zone. These do not
    # cause CI/brutal to fail, but should be treated as
    # "research / needs attention" in dashboards.
    warn_fail_fraction: 0.80
    warn_negative_expected_profit_fraction: 0.40

    # Softer "research-ok" thresholds used for YELLOW tier.
    # Regimes that clear these but fail the production bars
    # can be treated as promising but not yet production ready.
    warn_profit_factor: 1.0
    warn_win_rate: 0.48
    warn_annual_return: -0.05
    warn_pass_rate: 0.02
  regression_metrics:
    # Baseline used for RMSE gating in scripts/check_forecast_audits.py.
    # BEST_SINGLE compares the ensemble to the best single model (lowest RMSE)
    # on each evaluated window, enforcing a "do not add complexity without lift"
    # guardrail.
    baseline_model: BEST_SINGLE
    # Minimum effective audits with RMSE before promotion/weight changes. Use a
    # lower value for brutal/CI and a higher value for research dashboards.
    min_effective_audits: 10
    max_rmse_ratio_vs_baseline: 1.1
    # Phase 7.9: raised from 0.25 to 0.35.  The strict preselection gate
    # (strict_preselection_max_rmse_ratio=1.0) already blocks ensemble at
    # forecast time when RMSE ratio > 1.0.  This gate measures hypothetical
    # ensemble performance; the actual forecasts use best single model.
    # 0.35 accommodates periods where mssa_rl systematically beats blends.
    max_violation_rate: 0.35
    # Fresh-window stability guard: do not let broad historical passes mask
    # current degradation.
    recent_window_audits: 10
    recent_window_max_violation_rate: 0.35

    # Holding period: only enforce ensemble lift/no-lift decisions once we have
    # enough effective audits with RMSE values. Until then, checks are
    # considered inconclusive (non-failing).
    holding_period_audits: 20
    # Minimum lift required to "promote" the ensemble as default after holding
    # period is met (e.g., require >=2% RMSE improvement).
    promotion_margin: 0.02

    # Safety: if true, do not allow obvious regressions to pass during the
    # holding period. If the current effective audits already violate the RMSE
    # ceiling beyond max_violation_rate, fail immediately (CI/brutal-safe).
    #
    # Phase 7.19: Changed from true to false. During DISABLE_DEFAULT posture the
    # ensemble is already blocked at forecast-time by strict_preselection_gate
    # (max_rmse_ratio=1.0). Warmup violations add no marginal safety and cause
    # check_model_improvement Layer 2 to FAIL even though production trades are
    # unaffected. Changed to false so that high violation rates during warmup
    # surface as INCONCLUSIVE (exit 0) rather than hard-FAIL.
    # Revert to true once ensemble exits DISABLE_DEFAULT posture and
    # lift_fraction >= min_lift_fraction (0.25) over 20+ fresh audit windows.
    fail_on_violation_during_holding_period: false

    # WIRE-03 fix: maximum days the system may stay in INCONCLUSIVE warmup before
    # --allow-inconclusive-lift is treated as FAIL. Prevents indefinite bypass.
    max_warmup_days: 30

    # If true, fail the RMSE gate when the ensemble does not demonstrate enough
    # lift over the selected baseline across the holding period window.
    # Keep ensemble in non-default/research-only posture when lift is weak, but
    # do not hard-fail unattended readiness solely on no-lift evidence.
    #
    # Governance: keep false (fail-open) while DISABLE_DEFAULT posture holds.
    # Ensemble is already in DISABLE_DEFAULT / research-only mode -- the
    # operational signal is correct without hard-failing overnight runs.
    # Flip to true ONLY when ALL of the following are true:
    #   1. lift_fraction >= min_lift_fraction (0.25) across 20+ fresh audit windows
    #   2. Those audit windows were generated post-Phase-7.15-F ensemble fix
    #   3. Recent-window violation rate is consistently below max_violation_rate
    # Current status: 1.67% lift fraction vs 25% required (as of 2026-02-26).
    disable_ensemble_if_no_lift: false

    # "Lift" means ensemble_rmse <= (1 - min_lift_rmse_ratio) * baseline_rmse.
    # 0.00 means "any improvement counts". 0.02 means ">=2% RMSE improvement".
    # Phase 7.14: raised to 0.02 — epsilon improvement no longer counts as lift.
    min_lift_rmse_ratio: 0.02

    # Minimum fraction of effective audits that must show lift; otherwise we
    # recommend disbanding the ensemble as default source of truth.
    # 25% requires meaningful evidence of ensemble benefit over best-single.
    min_lift_fraction: 0.25
    # Hard-fail threshold for Layer 1: fewer than this fraction of windows
    # showing lift is an unambiguous signal that the ensemble is broken
    # (not merely underperforming).  Intentionally lower than min_lift_fraction
    # so that WARN fires well before FAIL.  Only fires when n_used >= 100.
    fail_lift_fraction: 0.05
    # Exclude short-horizon research/test audits from production lift gating.
    # Production auto-trader uses longer horizons (typically 30); low-horizon
    # artifacts can inflate recent-window violation rates in narrow scans.
    min_forecast_horizon: 20
    # Alert/fail if ensemble metrics are missing too often from audit payloads.
    max_missing_ensemble_rate: 0.05
    # Residual-diagnostics default-path gate: model-backed default selections
    # should expose diagnostics, and too many non-white-noise residuals should
    # block promotion/production readiness.
    max_non_white_noise_rate: 0.25
    min_residual_diagnostics_n: 20
    fail_on_missing_residual_diagnostics: true
    max_index_mismatch_rate: 0.0
    # THIN_LINKAGE gate thresholds (production_audit_gate.py).
    # Minimum number of outcome windows that must be matched AND the minimum
    # fraction of eligible windows that must be matched before the linkage gate
    # passes. Both are relaxed to 1 / 0.0 during the warmup period.
    linkage_min_matched: 10
    linkage_min_ratio: 0.8
    # Audit provenance hardening (set to fail after legacy audit backfill).
    manifest_integrity_mode: warn
    manifest_filename: forecast_audit_manifest.jsonl

    # Preselection hard gate (forecast-time): block ensemble from being the
    # default forecast source when recent ensemble/best-single RMSE ratio is
    # above this strict threshold.
    strict_preselection_gate_enabled: true
    strict_preselection_max_rmse_ratio: 1.0
    strict_preselection_recent_window: 10
    strict_preselection_min_effective_audits: 5
  per_ticker:
    AAPL:
      min_profit_factor: 1.15
      min_win_rate: 0.53
      min_annual_return: 0.0
      min_pass_rate: 0.02
      warn_profit_factor: 1.05
      warn_win_rate: 0.50
      warn_annual_return: -0.02
      warn_pass_rate: 0.03
    MSFT:
      min_profit_factor: 1.15
      min_win_rate: 0.53
      min_annual_return: 0.0
      min_pass_rate: 0.02
      warn_profit_factor: 1.05
      warn_win_rate: 0.50
      warn_annual_return: -0.02
      warn_pass_rate: 0.03
    CL=F:
      min_profit_factor: 1.3
      min_win_rate: 0.55
      min_annual_return: 0.05
      min_pass_rate: 0.05
      disable_time_series: true
    GC=F:
      min_profit_factor: 1.1
      min_win_rate: 0.52
      min_annual_return: 0.0
      min_pass_rate: 0.02
    BTC-USD:
      min_profit_factor: 1.3
      min_win_rate: 0.55
      min_annual_return: 0.05
      min_pass_rate: 0.05
      disable_time_series: true
    EURUSD=X:
      min_profit_factor: 1.2
      min_win_rate: 0.53
      min_annual_return: 0.0
      min_pass_rate: 0.03
      disable_time_series: true
    SOL:
      min_profit_factor: 1.5
      min_win_rate: 0.60
      min_annual_return: 0.05
      min_pass_rate: 0.05
      disable_time_series: true
    GS:
      disable_time_series: true
