strategy_optimization:
  # Search space for stochastic optimization. Values here define ranges and
  # choices only; no single configuration is treated as "best" in code.
  search_space:
    ensemble_weight_sarimax:
      type: continuous
      bounds: [0.0, 1.0]
    ensemble_weight_garch:
      type: continuous
      bounds: [0.0, 1.0]
    ensemble_weight_samossa:
      type: continuous
      bounds: [0.0, 1.0]
    ensemble_weight_mssa_rl:
      type: continuous
      bounds: [0.0, 1.0]
    sizing_kelly_fraction_cap:
      type: continuous
      bounds: [0.0, 0.5]
    diversification_penalty:
      type: continuous
      bounds: [0.0, 1.0]
    execution_style:
      type: categorical
      choices: ["market", "limit_bias"]

  # Objective weights for scoring candidates. Positive weights reward; negative
  # weights penalize. These weights are purely configuration-driven.
  # Barbell-asymmetry policy: reward upside shape directly (omega_ratio,
  # payoff_asymmetry, profit_factor) and penalize tail loss
  # (max_drawdown, expected_shortfall). win_rate and sortino are intentionally
  # omitted — asymmetric systems can profit at low hit rate when winners are
  # materially larger than losers.
  objectives:
    total_return: 1.0
    alpha: 0.25
    information_ratio: 0.15
    omega_ratio: 0.8
    payoff_asymmetry_effective: 0.6
    profit_factor: 0.5
    expected_shortfall: -0.4
    max_drawdown: -0.5

  objective_thresholds:
    total_return: 0.0
    alpha: 0.0
    information_ratio: 0.0
    omega_ratio: 1.0
    payoff_asymmetry_effective: 1.10
    profit_factor: 1.0
    expected_shortfall: -0.0108
    max_drawdown: 0.30

  # Hard constraints on metrics. The optimizer will discard candidates whose
  # evaluated metrics do not satisfy these thresholds.
  # NOTE: win_rate is NOT a constraint here — barbell-asymmetry policy permits low win rate
  # when payoff asymmetry is large (p*avg_win > (1-p)*avg_loss). Candidates are
  # evaluated by omega_ratio + payoff_asymmetry + profit_factor, not by
  # directional accuracy.
  # Anti-barbell bundle: these booleans are hard gates, not scoring inputs.
  constraints:
    min:
      profit_factor: 1.0
      omega_monotonicity_ok: true
      omega_cliff_ok: true
      omega_right_tail_ok: true
      es_to_edge_bounded: true
      barbell_path_risk_ok: true
      regime_realism_ok: true
      anti_barbell_ok: true
    max:
      max_drawdown: 0.3

  evaluation:
    # Shorten the default window so recent trades (e.g., last week) are evaluated
    default_lookback_days: 14
    quant_config_path: config/quant_success_config.yml
    forecasting_config_path: config/forecasting_config.yml

  regimes:
    default:
      description: "Fallback regime; drift and volatility not classified."
      lookback_days: 14
