      samossa: 0.2
      mssa_rl: 0.1
    - garch: 0.6
      samossa: 0.25
      mssa_rl: 0.15
    - samossa: 0.6
      mssa_rl: 0.4
    - samossa: 0.45
      garch: 0.35
      mssa_rl: 0.2
    - mssa_rl: 0.7
      garch: 0.3
    - mssa_rl: 0.7
      samossa: 0.3
    - garch: 1.0
    - samossa: 1.0
    - mssa_rl: 1.0
    minimum_component_weight: 0.05
    da_floor: 0.1
    da_weight_cap: 0.1
  regime_detection:
    enabled: true
    lookback_window: 60
    vol_threshold_low: 0.15
    vol_threshold_high: 0.25
    trend_threshold_weak: 0.3
    trend_threshold_strong: 0.6
