forecasting:
  enabled: true
  default_forecast_horizon: 30
  minimum_history_required: 90
  minimum_history_strict: 30
  sarimax:
    enabled: false
    auto_select_order: true
    max_p: 3
    max_d: 1
    max_q: 2
    seasonal_periods: null
    max_P: 2
    max_D: 1
    max_Q: 2
    trend: c
    enforce_stationarity: true
    enforce_invertibility: true
  garch:
    enabled: true
    p: 1
    q: 1
    max_p: 2
    max_q: 2
    vol: GARCH
    dist: skewt
    mean: AR
    enforce_stationarity: true
    igarch_fallback: gjr
  samossa:
    enabled: true
    window_length: null
    n_components: 8
    use_residual_arima: true
    arima_order:
    - 1
    - 0
    - 0
    seasonal_order:
    - 0
    - 0
    - 0
    - 0
    min_series_length: 120
    max_forecast_steps: 63
    reconstruction_method: diagonal_averaging
    trend_slope_bars: 10
  mssa_rl:
    enabled: true
    window_length: 30
    rank: null
    change_point_threshold: 4.0
    q_learning_alpha: 0.3
    q_learning_gamma: 0.85
    q_learning_epsilon: 0.1
    use_gpu: true
    min_series_length: 150
    max_forecast_steps: 30
    use_q_strategy_selection: true
    reward_mode: directional_pnl
  combined:
    enabled: true
    use_sarimax_mean: true
    use_garch_volatility: true
    combine_confidence_intervals: true
  ensemble:
    enabled: true
    confidence_scaling: true
    track_directional_accuracy: true
    prefer_diversified_candidate: true
    diversity_tolerance: 0.05
    candidate_weights:
