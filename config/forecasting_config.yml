        preferred_models:
        - garch
        - samossa
        - mssa_rl
        description: Stable low-volatility markets, GARCH volatility forecasting optimal
      MODERATE_RANGEBOUND:
        preferred_models:
        - garch
        - samossa
        - mssa_rl
        description: Low volatility with some directional bias
      MODERATE_TRENDING:
        preferred_models:
        - samossa
        - garch
        - mssa_rl
        description: Clear trend with moderate volatility
      HIGH_VOL_TRENDING:
        preferred_models:
        - samossa
        - mssa_rl
        - garch
        description: Volatile directional moves, complex patterns
      CRISIS:
        preferred_models:
        - garch
        - samossa
        description: Crisis mode, focus on volatility and simple models
      MODERATE_MIXED:
        preferred_models:
        - garch
        - samossa
        - mssa_rl
        description: No clear regime, use balanced ensemble
  order_learning:
    enabled: true
    min_fits_to_suggest: 3
    max_order_age_days: 90
    skip_grid_threshold: 5
    regime_aware: true
    samossa_max_ar_lag: 4
