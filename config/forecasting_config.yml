      - garch: 0.45
        samossa: 0.35
        mssa_rl: 0.2
      MODERATE_TRENDING:
      - garch: 0.4
        samossa: 0.45
        mssa_rl: 0.15
      - garch: 0.55
        samossa: 0.35
        mssa_rl: 0.1
      HIGH_VOL_TRENDING:
      - garch: 0.45
        samossa: 0.4
        mssa_rl: 0.15
      - garch: 0.55
        samossa: 0.3
        mssa_rl: 0.15
    regime_model_preferences:
