name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.10"

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Documentation contract audit (blocking)
        run: python scripts/doc_contract_audit.py --strict

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libblas-dev liblapack-dev libhdf5-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit
          pip check

      - name: Security preflight (blocking)
        run: |
          mkdir -p reports/security
          python scripts/security_preflight.py \
            --require-pip-audit \
            --output-json reports/security/security_preflight_${{ github.run_id }}.json

      - name: Secrets guard (blocking)
        run: python tools/secrets_guard.py scan --tracked --strict

      - name: OpenClaw + orchestration smoke (blocking)
        run: |
          python scripts/llm_multi_model_orchestrator.py health
          python scripts/openclaw_self_improve.py index
          python scripts/openclaw_models.py status
          python scripts/pmx_interactions_api.py --check

      - name: OpenClaw connectivity regression gate
        run: |
          if command -v openclaw >/dev/null 2>&1; then
            python scripts/openclaw_regression_gate.py --json
          else
            python scripts/openclaw_regression_gate.py --allow-missing-openclaw --json
          fi

      - name: Integrity CI gate (blocking)
        run: python scripts/ci_integrity_gate.py --strict

      - name: Forecasting config integrity gate (blocking)
        run: python scripts/validate_forecasting_configs.py --json

      - name: Institutional unattended hardening gate (blocking)
        run: python scripts/institutional_unattended_gate.py --json

      - name: Adversarial integrity suite (blocking when DB exists)
        run: |
          if [ -f data/portfolio_maximizer.db ]; then
            python scripts/adversarial_integrity_test.py --db data/portfolio_maximizer.db
          else
            echo "Skipping adversarial_integrity_test.py (data/portfolio_maximizer.db missing)."
          fi

      - name: Upload security preflight artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-preflight
          path: reports/security/*.json

  fast-pytest:
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libblas-dev liblapack-dev libhdf5-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fast feedback test lane
        run: pytest -v --tb=short -m "not gpu and not slow and not integration"

  full-pytest:
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libblas-dev liblapack-dev libhdf5-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Full non-GPU test lane
        run: pytest -v --tb=short -m "not gpu"

  integration-routing:
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libblas-dev liblapack-dev libhdf5-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify ensemble routing integration (blocking)
        run: pytest -v --tb=short tests/integration/test_ensemble_routing.py

  adversarial-forecaster:
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TS_FORECAST_AUDIT_DIR: "0"
      TS_FORECAST_MONITOR_CONFIG: config/forecaster_monitoring_ci.yml
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libblas-dev liblapack-dev libhdf5-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Reset warning log for convergence budget gate
        run: |
          mkdir -p logs/warnings
          rm -f logs/warnings/warning_events.log

      - name: Run adversarial forecaster gate (blocking)
        run: |
          python scripts/run_adversarial_forecaster_suite.py \
            --monitor-config config/forecaster_monitoring_ci.yml \
            --enforce-thresholds \
            --output reports/adversarial_forecaster/ci_suite_${{ github.run_id }}.json

      - name: Enforce SARIMAX convergence budget (blocking)
        run: |
          python scripts/check_sarimax_convergence_budget.py \
            --monitor-config config/forecaster_monitoring_ci.yml \
            --warning-log logs/warnings/warning_events.log \
            --suite-report reports/adversarial_forecaster/ci_suite_${{ github.run_id }}.json

      - name: Upload adversarial suite artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: adversarial-forecaster-suite
          path: reports/adversarial_forecaster/*.json

  ci-summary:
    if: always()
    needs:
      - preflight
      - fast-pytest
      - full-pytest
      - integration-routing
      - adversarial-forecaster
    runs-on: ubuntu-latest
    steps:
      - name: Publish CI summary
        run: |
          {
            echo "## CI lane summary"
            echo ""
            echo "| Job | Result |"
            echo "|---|---|"
            echo "| preflight | ${{ needs.preflight.result }} |"
            echo "| fast-pytest | ${{ needs.fast-pytest.result }} |"
            echo "| full-pytest | ${{ needs.full-pytest.result }} |"
            echo "| integration-routing | ${{ needs.integration-routing.result }} |"
            echo "| adversarial-forecaster | ${{ needs.adversarial-forecaster.result }} |"
            echo ""
            echo "Fast feedback lane: \`pytest -m \"not gpu and not slow and not integration\"\`"
            echo ""
            echo "Full blocking test lane remains: \`pytest -m \"not gpu\"\`"
          } >> "$GITHUB_STEP_SUMMARY"
