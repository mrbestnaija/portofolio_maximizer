name: Sync issues and PRs to Project 7

on:
  issues:
    types: [opened, reopened, labeled, unlabeled, edited]
  pull_request:
    types: [opened, reopened, ready_for_review, labeled, unlabeled, edited]
  workflow_dispatch:

# This workflow uses a PAT via secrets.PROJECTS_TOKEN because
# GitHub Projects (v2) requires GraphQL access beyond default GITHUB_TOKEN in some org/user setups.
# Create a classic PAT with project and repo scopes and add it as a repository secret named PROJECTS_TOKEN.

permissions:
  contents: read

jobs:
  add_to_project:
    # Skip fork PRs (no access to secrets from fork workflows).
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    env:
      # Map secret to env so it can be checked in a step-level if (secrets context
      # is not available in job-level if expressions).
      PROJECTS_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
    steps:
      - name: Add item to GitHub Project 7
        # Skip silently when PROJECTS_TOKEN is not configured (fresh repos / forks).
        if: env.PROJECTS_TOKEN != ''
        uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/users/${{ github.repository_owner }}/projects/7
          github-token: ${{ secrets.PROJECTS_TOKEN }}
