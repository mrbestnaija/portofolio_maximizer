auth_enabled: false

server:
  http_listen_address: 127.0.0.1
  http_listen_port: 3100
  grpc_listen_port: 0

common:
  path_prefix: ${PMX_LOKI_DATA_PATH}
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory
  storage:
    filesystem:
      chunks_directory: ${PMX_LOKI_DATA_PATH}/chunks
      rules_directory: ${PMX_LOKI_DATA_PATH}/rules

schema_config:
  configs:
    - from: 2026-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

ruler:
  storage:
    type: local
    local:
      directory: ${PMX_LOKI_DATA_PATH}/rules
  rule_path: ${PMX_LOKI_DATA_PATH}/rules-temp

analytics:
  reporting_enabled: false

limits_config:
  allow_structured_metadata: false
  volume_enabled: true
