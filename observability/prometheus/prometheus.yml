global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    instance: pmx-local

rule_files:
  - rules/pmx_alerts.yml

scrape_configs:
  - job_name: pmx_exporter
    static_configs:
      - targets:
          - 127.0.0.1:9765

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 127.0.0.1:9093
